services:
  backend:
    build:
      context: ./proxyapi_core
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: proxyapi-mad-backend:local
    container_name: proxyapi-mad-backend
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./proxyapi_core/config.yaml:/CLIProxyAPI/config.yaml
      - ./proxyapi_core/auths:/root/.cli-proxy-api
      - ./proxyapi_core/logs:/CLIProxyAPI/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: proxyapi-mad-frontend:local
    container_name: proxyapi-mad-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

name: pr-test-build

on:
  pull_request:
    paths:
      - proxyapi_core/**
      - .github/workflows/pr-test-build.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > proxyapi_core/internal/registry/models/models.json
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: proxyapi_core/go.mod
          cache-dependency-path: proxyapi_core/go.sum
          cache: true
      - name: Build
        working-directory: proxyapi_core
        run: |
          go build -o test-output ./cmd/server
          rm -f test-output
